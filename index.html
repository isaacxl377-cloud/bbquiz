                q: "耶稣受洗之后他看见了什么？",
                options: ["天忽然为他开了，神的灵仿佛鸽子降下", "雷电交加", "天使在水面上行走", "彩虹横跨天空"],
                answer: 0,
                verse: "耶稣受了洗，随即从水里上来。天忽然为他开了，他就看见神的灵仿佛鸽子降下，落在他身上。",
                ref: "马太福音 3:16"
            },
            {
                q: "耶稣受洗之后听见了什么声音？",
                options: ["你当悔改信福音", "这是我的爱子，我所喜悦的", "你要往普天下去传福音", "你是以色列的王"],
                answer: 1,
                verse: "忽然有声音从天上来，说：“这是我的爱子，我所喜悦的。”",
                ref: "马太福音 3:17"
            },
            {
                q: "耶稣被圣灵引到旷野，禁食多久受魔鬼的试探？",
                options: ["三天三夜", "七天七夜", "四十昼夜", "一年"],
                answer: 2,
                verse: "当时，耶稣被圣灵引到旷野，受魔鬼的试探。他禁食四十昼夜，后来就饿了。",
                ref: "马太福音 4:1-2"
            },
            {
                q: "耶稣在旷野受魔鬼的试探，魔鬼首先叫他把什么变成食物？耶稣怎么回答的？",
                options: ["水变成酒；人活着不是单靠食物", "石头变成食物；人活着不是单靠食物，乃是靠神口里所出的一切话", "树木变成面包；不可试探主", "沙子变成饼；当拜主你的神"],
                answer: 1,
                verse: "那试探人的进前来，对他说：“你若是神的儿子，可以吩咐这些石头变成食物。”耶稣却回答说：“经上记着说：‘人活着，不是单靠食物，乃是靠神口里所出的一切话。’”",
                ref: "马太福音 4:3-4"
            },
            {
                q: "魔鬼第二次试探耶稣，叫他从殿顶跳下去，耶稣是怎么回答的？",
                options: ["天使会托住我", "不可试探主你的神", "我不试探神", "神必保护我"],
                answer: 1,
                verse: "耶稣对他说：“经上又记着说：‘不可试探主你的神。’”",
                ref: "马太福音 4:7"
            },
            {
                q: "魔鬼第三次带耶稣上最高的山，用万国的荣华试探他，耶稣是怎么回答的？",
                options: ["撒但退去吧！当拜主你的神，单要侍奉他。", "我不要世上的荣华", "神已经把万国赐给我了", "你是个说谎的"],
                answer: 0,
                verse: "耶稣说：“撒但（撒但就是抵挡的意思，乃魔鬼的别名），退去吧！因为经上记着说：‘当拜主你的神，单要侍奉他。’”",
                ref: "马太福音 4:10"
            },
            {
                q: "魔鬼用尽了各样的试探，就怎样了？",
                options: ["被耶稣捆绑了", "逃进海里", "就暂时离开耶稣", "化作一条蛇"],
                answer: 2,
                verse: "魔鬼用尽各样的试探，就暂时离开耶稣。",
                ref: "路加福音 4:13"
            },
            {
                q: "约翰下监以后，耶稣离开拿撒勒，退到了哪里传福音？",
                options: ["撒马利亚", "埃及", "加利利的海边，迦百农", "伯大尼"],
                answer: 2,
                verse: "耶稣听见约翰下了监，就退到加利利去；后又离开拿撒勒，往迦百农去，就住在那里。那地方靠海...",
                ref: "马太福音 4:12-13"
            },
            {
                q: "耶稣开始传道的第一句话是怎么说的？",
                options: ["你们要彼此相爱", "天国近了，你们应当悔改！", "信我的人有永生", "我是世界的光"],
                answer: 1,
                verse: "从那时候，耶稣就传起道来，说：“天国近了，你们应当悔改！”",
                ref: "马太福音 4:17"
            },
            {
                q: "耶稣在安息日进了拿撒勒的会堂，念了先知以赛亚的预言后，坐下说了什么？",
                options: ["这预言将来要成就", "你们当听先知的话", "今天这经应验在你们耳中了", "凡有耳的就应当听"],
                answer: 2,
                verse: "耶稣对他们说：“今天这经应验在你们耳中了。”",
                ref: "路加福音 4:21"
            }
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let mistakes = new Set(JSON.parse(localStorage.getItem('jesusQuizMistakes') || '[]'));
        let isReviewMode = false;
        let hasAnswered = false;

        let timerInterval = null;
        let timeElapsed = 0;
        let startTime = 0;

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        const appDiv = document.getElementById('app');

        function saveMistakes() {
            localStorage.setItem('jesusQuizMistakes', JSON.stringify(Array.from(mistakes)));
        }

        function renderHome() {
            clearInterval(timerInterval);
            const mistakesCount = mistakes.size;
            
            let html = `
                <div class="flex-grow flex flex-col items-center justify-center p-8 fade-in">
                    <div class="w-24 h-24 bg-blue-100 rounded-3xl flex items-center justify-center mb-6 shadow-sm">
                        <svg class="w-12 h-12 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold text-gray-900 mb-2 tracking-tight text-center">耶稣生平知多少</h1>
                    <p class="text-gray-500 mb-10 text-center">从降生到开始传道事工<br>共 50 道精选题目</p>
                    
                    <button onclick="startQuiz(false)" class="w-full bg-blue-600 text-white font-semibold py-4 px-6 rounded-2xl shadow-sm hover:bg-blue-700 active:scale-95 transition-all text-lg mb-4">
                        开始进入答题
                    </button>
            `;

            if (mistakesCount > 0) {
                html += `
                    <button onclick="startQuiz(true)" class="w-full bg-red-50 text-red-600 font-semibold py-4 px-6 rounded-2xl border border-red-100 hover:bg-red-100 active:scale-95 transition-all text-lg flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        错题订正 (${mistakesCount})
                    </button>
                `;
            }

            html += `</div>`;
            appDiv.innerHTML = html;
        }

        function startQuiz(review = false) {
            isReviewMode = review;
            score = 0;
            currentIndex = 0;
            hasAnswered = false;

            timeElapsed = 0;
            startTime = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeElapsed = Math.floor((Date.now() - startTime) / 1000);
                const timerEl = document.getElementById('quizTimer');
                if (timerEl) {
                    timerEl.innerText = formatTime(timeElapsed);
                }
            }, 1000);

            if (isReviewMode) {
                // Get question objects based on mistake indices
                currentQuestions = Array.from(mistakes).map(index => ({ ...questions[index], originalIndex: index }));
            } else {
                currentQuestions = questions.map((q, i) => ({ ...q, originalIndex: i }));
            }

            renderQuestion();
        }

        function renderQuestion() {
            if (currentIndex >= currentQuestions.length) {
                clearInterval(timerInterval);
                renderResult();
                return;
            }

            const q = currentQuestions[currentIndex];
            const progress = ((currentIndex) / currentQuestions.length) * 100;
            const modeText = isReviewMode ? '错题订正' : '答题中';

            let html = `
                <!-- Header / Progress -->
                <div class="px-6 pt-6 pb-4 bg-white ios-shadow z-10 flex flex-col sticky top-0">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-semibold tracking-wider text-gray-400 uppercase">${modeText}</span>
                        <div class="flex items-center space-x-3">
                            <span id="quizTimer" class="text-sm font-mono font-medium text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md">${formatTime(timeElapsed)}</span>
                            <span class="text-sm font-medium text-gray-900">${currentIndex + 1} / ${currentQuestions.length}</span>
                        </div>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-1.5">
                        <div class="bg-blue-600 h-1.5 rounded-full transition-all duration-300 ease-out" style="width: ${progress}%"></div>
                    </div>
                </div>

                <!-- Question Area -->
                <div class="flex-grow overflow-y-auto px-6 py-6 pb-32 fade-in" id="scrollArea">
                    <h2 class="text-xl font-semibold text-gray-900 mb-8 leading-snug">${q.q}</h2>
                    
                    <div class="space-y-3" id="optionsContainer">
            `;

            q.options.forEach((opt, idx) => {
                html += `
                        <button onclick="handleAnswer(${idx})" id="opt-${idx}" class="option-btn w-full text-left p-4 rounded-2xl border-2 border-transparent bg-white shadow-sm font-medium text-gray-700 hover:border-gray-200 transition-colors">
                            <span class="inline-block w-6 text-gray-400">${String.fromCharCode(65 + idx)}.</span> ${opt}
                        </button>
                `;
            });

            html += `
                    </div>
                    
                    <!-- Feedback Area (Hidden initially) -->
                    <div id="feedbackBox" class="hidden mt-8 slide-up">
                        <div id="feedbackBanner" class="p-4 rounded-2xl mb-4 font-semibold text-center flex items-center justify-center">
                            <!-- Injected by JS -->
                        </div>
                        <div class="bg-blue-50/50 rounded-2xl p-5 border border-blue-100">
                            <p class="text-xs font-bold text-blue-600 mb-1">【${q.ref}】</p>
                            <p class="text-sm text-gray-800 leading-relaxed">${q.verse}</p>
                        </div>
                    </div>
                </div>

                <!-- Bottom Action Area -->
                <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-[#F2F2F7] via-[#F2F2F7] to-transparent z-10 pointer-events-none">
                    <button id="nextBtn" onclick="nextQuestion()" class="w-full bg-gray-900 text-white font-semibold py-4 px-6 rounded-2xl shadow-lg hover:bg-black active:scale-95 transition-all text-lg opacity-0 translate-y-4 pointer-events-auto hidden">
                        ${currentIndex === currentQuestions.length - 1 ? '查看结果' : '下一题'}
                    </button>
                </div>
            `;

            appDiv.innerHTML = html;
            hasAnswered = false;
        }

        function handleAnswer(selectedIndex) {
            if (hasAnswered) return;
            hasAnswered = true;

            const q = currentQuestions[currentIndex];
            const correctIndex = q.answer;
            const originalId = q.originalIndex;
            const isCorrect = selectedIndex === correctIndex;

            if (isCorrect) {
                score++;
                if (isReviewMode) {
                    mistakes.delete(originalId); // Correct in review -> remove from mistakes
                } else {
                    mistakes.delete(originalId); // Just in case they got it right in normal mode after having it in mistakes
                }
            } else {
                mistakes.add(originalId); // Wrong -> add to mistakes
            }
            saveMistakes();

            // Styling options
            for (let i = 0; i < 4; i++) {
                const btn = document.getElementById(`opt-${i}`);
                btn.classList.remove('bg-white', 'shadow-sm', 'hover:border-gray-200');
                btn.disabled = true;

                if (i === correctIndex) {
                    btn.classList.add('bg-green-50', 'border-green-500', 'text-green-800');
                } else if (i === selectedIndex && !isCorrect) {
                    btn.classList.add('bg-red-50', 'border-red-400', 'text-red-700');
                } else {
                    btn.classList.add('opacity-50');
                }
            }

            // Show feedback
            const feedbackBox = document.getElementById('feedbackBox');
            const feedbackBanner = document.getElementById('feedbackBanner');
            
            if (isCorrect) {
                feedbackBanner.className = 'p-4 rounded-2xl mb-4 font-semibold text-center flex items-center justify-center bg-green-100 text-green-700';
                feedbackBanner.innerHTML = `<svg class="w-5 h-5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> 回答正确`;
            } else {
                feedbackBanner.className = 'p-4 rounded-2xl mb-4 font-semibold text-center flex items-center justify-center bg-red-100 text-red-700';
                feedbackBanner.innerHTML = `<svg class="w-5 h-5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> 回答错误，正确答案是 ${String.fromCharCode(65 + correctIndex)}`;
            }

            feedbackBox.classList.remove('hidden');

            // Show Next Button
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.classList.remove('hidden');
            // Small timeout to allow display:block to apply before animating opacity
            setTimeout(() => {
                nextBtn.style.opacity = '1';
                nextBtn.style.transform = 'translateY(0)';
            }, 50);

            // Scroll to bottom
            setTimeout(() => {
                const scrollArea = document.getElementById('scrollArea');
                scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        function nextQuestion() {
            currentIndex++;
            renderQuestion();
        }

        function renderResult() {
            let message = "";
            let emoji = "";
            let percentage = Math.round((score / currentQuestions.length) * 100);

            if (isReviewMode) {
                if (mistakes.size === 0) {
                    message = "太棒了！所有的错题都已清空。";
                    emoji = "🎉";
                } else {
                    message = `还有 ${mistakes.size} 道错题，继续加油！`;
                    emoji = "💪";
                }
            } else {
                if (percentage === 100) {
                    message = "完美满分！您对圣经非常熟悉。";
                    emoji = "🏆";
                } else if (percentage >= 80) {
                    message = "非常出色！您对耶稣的生平很了解。";
                    emoji = "🌟";
                } else if (percentage >= 60) {
                    message = "不错哦，继续多多查考圣经。";
                    emoji = "📖";
                } else {
                    message = "还需要更多熟悉圣经，借着错题复习吧！";
                    emoji = "🌱";
                }
            }

            const html = `
                <div class="flex-grow flex flex-col items-center justify-center p-8 fade-in">
                    <div class="text-6xl mb-6">${emoji}</div>
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">答题结束</h1>
                    
                    <div class="bg-white rounded-3xl shadow-sm p-6 w-full mt-6 mb-8 border border-gray-100/80 ios-shadow">
                        <div class="flex justify-around items-center">
                            <div class="text-center">
                                <p class="text-xs text-gray-400 uppercase tracking-widest mb-1">您的成绩</p>
                                <p class="text-4xl font-black text-blue-600">${score}<span class="text-xl text-gray-400 font-medium">/${currentQuestions.length}</span></p>
                            </div>
                            <div class="w-px h-12 bg-gray-200 rounded-full"></div>
                            <div class="text-center">
                                <p class="text-xs text-gray-400 uppercase tracking-widest mb-1">用时</p>
                                <p class="text-3xl font-black text-gray-700 font-mono mt-1">${formatTime(timeElapsed)}</p>
                            </div>
                        </div>
                    </div>
                    
                    <p class="text-gray-700 text-center mb-12 text-lg px-4">${message}</p>
                    
                    <button onclick="renderHome()" class="w-full bg-gray-900 text-white font-semibold py-4 px-6 rounded-2xl shadow-md hover:bg-black active:scale-95 transition-all text-lg">
                        返回首页
                    </button>
                </div>
            `;
            appDiv.innerHTML = html;
        }

        // Initialize App
        window.onload = () => {
            renderHome();
        };
    </script>
</body>
</html>
