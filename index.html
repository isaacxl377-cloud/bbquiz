<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>耶稣生平互动答题系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* 动画效果 */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 选项按钮选中状态 */
        .option-correct {
            background-color: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
        }
        .option-wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        .option-disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-900 flex justify-center overflow-hidden h-screen" style="height: 100dvh;">

    <!-- 移动端主容器 (限制最大宽度并充满动态屏幕高度) -->
    <div id="app" class="w-full max-w-md h-full bg-[#F2F2F7] flex flex-col relative shadow-2xl overflow-hidden">
        
        <!-- ================= 1. 首页 (Home Screen) ================= -->
        <div id="homeScreen" class="flex flex-col items-center justify-center h-full p-8 w-full">
            <div class="w-24 h-24 bg-blue-600 rounded-[2rem] shadow-lg flex items-center justify-center mb-8">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2 text-center">耶稣生平答题</h1>
            <p class="text-lg text-gray-500 mb-10 text-center">基于中文圣经和合本</p>
            
            <button onclick="startQuiz(false)" class="w-full bg-blue-600 text-white font-bold py-5 px-6 rounded-2xl shadow-md hover:bg-blue-700 active:scale-95 transition-all text-xl mb-4">
                开始全部答题 (50题)
            </button>
            
            <!-- 错题按钮，如果有错题则动态显示 -->
            <button id="mistakesBtn" onclick="startQuiz(true)" class="hidden w-full bg-red-100 text-red-600 font-bold py-5 px-6 rounded-2xl shadow-sm hover:bg-red-200 active:scale-95 transition-all text-xl">
                错题订正 (0)
            </button>
        </div>

        <!-- ================= 2. 答题页面 (Quiz Screen) ================= -->
        <div id="quizScreen" class="hidden flex-col h-full w-full">
            <!-- 顶部进度与计时栏 -->
            <div class="bg-white pt-6 pb-4 px-6 rounded-b-[2rem] shadow-sm z-20 shrink-0">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-gray-500 font-bold text-lg tracking-wider" id="progressText">1 / 50</span>
                    <span class="text-blue-600 font-bold text-lg font-mono bg-blue-50 px-3 py-1 rounded-lg" id="timerDisplay">00:00</span>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-2">
                    <div id="progressBar" class="bg-blue-600 h-2 rounded-full transition-all duration-300 ease-out" style="width: 2%"></div>
                </div>
            </div>

            <!-- 问题与选项滚动区 -->
            <div class="flex-grow overflow-y-auto px-6 py-6 pb-32 no-scrollbar" id="questionArea">
                <h2 id="questionText" class="text-2xl sm:text-3xl font-bold text-gray-900 mb-8 leading-snug tracking-wide">
                    <!-- 问题内容注入 -->
                </h2>
                
                <div class="space-y-4" id="optionsContainer">
                    <!-- 选项注入 -->
                </div>
                
                <!-- 反馈区域 (初始隐藏) -->
                <div id="feedbackBox" class="hidden mt-8 slide-up">
                    <div id="feedbackBanner" class="p-4 rounded-2xl mb-4 font-bold text-center flex items-center justify-center text-xl">
                        <!-- 结果标志注入 -->
                    </div>
                    <div class="bg-blue-50/70 rounded-2xl p-5 border-2 border-blue-100">
                        <p id="feedbackRef" class="text-base font-bold text-blue-600 mb-2">【经文出处】</p>
                        <p id="feedbackVerse" class="text-lg text-gray-800 leading-relaxed font-medium">
                            <!-- 经文内容注入 -->
                        </p>
                    </div>
                </div>
            </div>

            <!-- 绝对定位的底部操作区 (不会被遮挡) -->
            <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-[#F2F2F7] via-[#F2F2F7] to-transparent z-30">
                <button id="nextBtn" onclick="nextQuestion()" class="w-full bg-gray-900 text-white font-bold py-5 px-6 rounded-2xl shadow-xl hover:bg-black active:scale-95 transition-all text-xl opacity-0 translate-y-4 pointer-events-none">
                    下一题
                </button>
            </div>
        </div>

        <!-- ================= 3. 结果页面 (Result Screen) ================= -->
        <div id="resultScreen" class="hidden flex-col items-center justify-center h-full p-8 w-full slide-up">
            <div class="bg-white w-full rounded-[2rem] shadow-lg p-8 flex flex-col items-center text-center">
                <div id="resultIcon" class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-6">
                    <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-3xl font-bold text-gray-900 mb-2">完成答题！</h2>
                <p class="text-gray-500 mb-8 text-lg" id="resultDesc">本次练习情况如下</p>
                
                <div class="flex w-full space-x-4 mb-8">
                    <div class="flex-1 bg-blue-50 p-4 rounded-2xl">
                        <p class="text-sm text-blue-600 font-bold mb-1">得分</p>
                        <p class="text-3xl font-bold text-gray-900" id="scoreDisplay">0</p>
                    </div>
                    <div class="flex-1 bg-orange-50 p-4 rounded-2xl">
                        <p class="text-sm text-orange-600 font-bold mb-1">用时</p>
                        <p class="text-3xl font-bold text-gray-900" id="timeDisplay">00:00</p>
                    </div>
                </div>

                <button onclick="returnToHome()" class="w-full bg-gray-900 text-white font-bold py-5 px-6 rounded-2xl shadow-md hover:bg-black active:scale-95 transition-all text-xl mb-4">
                    返回首页
                </button>
            </div>
        </div>
    </div>

    <script>
        // === 题目数据 (完整 50 题) ===
        const allQuestions = [

            {

                options: ["信子的人有永生", "天国近了，你们应当悔改！", "我是世界的光", "你们要彼此相爱"],
                answer: 1,
                ref: "马太福音 4:17",
                verse: "从那时候，耶稣就传起道来，说：“天国近了，你们应当悔改！”"

        // === 状态变量 ===
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let mistakes = JSON.parse(localStorage.getItem('jesusQuizMistakes') || '[]');
        let isMistakeMode = false;
        
        // 计时器变量
        let timerInterval;
        let elapsedSeconds = 0;

        // === 初始化页面 ===
        window.onload = function() {
            updateHomeBtn();
        };

        function updateHomeBtn() {
            const mistakesBtn = document.getElementById('mistakesBtn');
            if (mistakes.length > 0) {
                mistakesBtn.innerText = `错题订正 (${mistakes.length})`;
                mistakesBtn.classList.remove('hidden');
            } else {
                mistakesBtn.classList.add('hidden');
            }
        }

        // === 计时器逻辑 ===
        function startTimer() {
            elapsedSeconds = 0;
            updateTimerDisplay();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                elapsedSeconds++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(elapsedSeconds / 60).toString().padStart(2, '0');
            const secs = (elapsedSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${mins}:${secs}`;
        }

        // === 核心流程控制 ===
        function startQuiz(mistakeMode) {
            isMistakeMode = mistakeMode;
            if (mistakeMode) {
                currentQuestions = allQuestions.filter(q => mistakes.includes(q.q));
                if (currentQuestions.length === 0) return;
            } else {
                currentQuestions = [...allQuestions];
            }
            
            currentIndex = 0;
            score = 0;
            
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('quizScreen').classList.add('flex');
            
            startTimer();
            renderQuestion();
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            const progress = ((currentIndex + 1) / currentQuestions.length) * 100;
            
            document.getElementById('progressText').innerText = `${currentIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('progressBar').style.width = `${progress}%`;
            
            document.getElementById('questionText').innerText = q.q;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.id = `opt-${idx}`;
                btn.className = "option-btn w-full text-left p-6 rounded-2xl border-2 border-transparent bg-white shadow-sm font-medium text-gray-800 hover:border-gray-200 transition-colors text-xl sm:text-2xl";
                btn.onclick = () => handleAnswer(idx);
                
                const span = document.createElement('span');
                span.className = "inline-block w-10 text-gray-400 font-bold";
                span.innerText = `${String.fromCharCode(65 + idx)}.`;
                
                const textNode = document.createTextNode(` ${opt}`);
                
                btn.appendChild(span);
                btn.appendChild(textNode);
                optionsContainer.appendChild(btn);
            });
            
            // 隐藏反馈区和下一题按钮
            document.getElementById('feedbackBox').classList.add('hidden');
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            nextBtn.innerText = currentIndex === currentQuestions.length - 1 ? '查看结果' : '下一题';
            
            // 滚动回顶部
            document.getElementById('questionArea').scrollTop = 0;
        }

        function handleAnswer(selectedIndex) {
            const q = currentQuestions[currentIndex];
            const isCorrect = selectedIndex === q.answer;
            const options = document.querySelectorAll('.option-btn');
            
            // 禁用所有选项
            options.forEach((btn, idx) => {
                btn.classList.add('option-disabled');
                if (idx === q.answer) {
                    btn.classList.add('option-correct');
                } else if (idx === selectedIndex && !isCorrect) {
                    btn.classList.add('option-wrong');
                }
            });
            
            // 记录错题或移除错题
            if (isCorrect) {
                score++;
                if (isMistakeMode) {
                    mistakes = mistakes.filter(mistake => mistake !== q.q);
                    saveMistakes();
                }
            } else {
                if (!mistakes.includes(q.q)) {
                    mistakes.push(q.q);
                    saveMistakes();
                }
            }
            
            // 显示反馈
            const feedbackBox = document.getElementById('feedbackBox');
            const feedbackBanner = document.getElementById('feedbackBanner');
            
            if (isCorrect) {
                feedbackBanner.className = "p-4 rounded-2xl mb-4 font-bold text-center flex items-center justify-center text-xl bg-green-100 text-green-700";
                feedbackBanner.innerHTML = `<svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg> 回答正确`;
            } else {
                feedbackBanner.className = "p-4 rounded-2xl mb-4 font-bold text-center flex items-center justify-center text-xl bg-red-100 text-red-700";
                feedbackBanner.innerHTML = `<svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg> 回答错误，正确答案是 ${String.fromCharCode(65 + q.answer)}`;
            }
            
            document.getElementById('feedbackRef').innerText = `【${q.ref}】`;
            document.getElementById('feedbackVerse').innerText = q.verse;
            
            feedbackBox.classList.remove('hidden');
            
            // 显示下一题按钮
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            
            // 自动滚动到底部以便看清反馈和按钮 (平滑滚动)
            setTimeout(() => {
                document.getElementById('questionArea').scrollTo({
                    top: document.getElementById('questionArea').scrollHeight,
                    behavior: 'smooth'
                });
            }, 100);
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            stopTimer();
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('flex');
            
            const resultScreen = document.getElementById('resultScreen');
            resultScreen.classList.remove('hidden');
            resultScreen.classList.add('flex');
            
            document.getElementById('scoreDisplay').innerText = `${score} / ${currentQuestions.length}`;
            
            const mins = Math.floor(elapsedSeconds / 60).toString().padStart(2, '0');
            const secs = (elapsedSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timeDisplay').innerText = `${mins}:${secs}`;
            
            const resultDesc = document.getElementById('resultDesc');
            const resultIcon = document.getElementById('resultIcon');
            
            if (score === currentQuestions.length) {
                resultDesc.innerText = "太棒了！全答对了！";
                resultIcon.className = "w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-6";
                resultIcon.innerHTML = `<svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
            } else {
                resultDesc.innerText = `还需要继续努力熟悉经文哦`;
                resultIcon.className = "w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center mb-6";
                resultIcon.innerHTML = `<svg class="w-10 h-10 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            }
        }

        function returnToHome() {
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('flex');
            document.getElementById('homeScreen').classList.remove('hidden');
            updateHomeBtn();
        }

        function saveMistakes() {
            localStorage.setItem('jesusQuizMistakes', JSON.stringify(mistakes));
        }
    </script>
