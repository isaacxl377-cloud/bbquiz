<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>耶稣生平及每日读经答题系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* 动画效果 */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 选项按钮选中状态 */
        .option-correct {
            background-color: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
            font-weight: 700;
        }
        .option-wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
            font-weight: 700;
        }
        .option-disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-900 flex justify-center overflow-hidden" style="height: 100dvh;">

    <!-- 移动端主容器 (限制最大宽度并充满动态屏幕高度) -->
    <div id="app" class="w-full max-w-md h-full bg-[#F2F2F7] flex flex-col relative shadow-2xl overflow-hidden">
        
        <!-- ================= 1. 首页 (Home Screen) ================= -->
        <div id="homeScreen" class="flex flex-col items-center justify-center h-full p-6 w-full">
            <div class="w-24 h-24 bg-blue-600 rounded-[2rem] shadow-lg flex items-center justify-center mb-6">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <h1 class="text-4xl font-bold text-gray-900 mb-2 text-center">互动答题</h1>
            <p class="text-xl text-gray-500 mb-10 text-center">基于中文圣经和合本</p>
            
            <div class="w-full space-y-4">
                <!-- 原主测试按钮 -->
                <button onclick="startQuiz('main')" class="w-full bg-blue-600 text-white font-bold py-5 px-6 rounded-2xl shadow-md hover:bg-blue-700 active:scale-95 transition-all text-2xl flex items-center justify-center">
                    <svg class="w-7 h-7 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    耶稣生平全测
                </button>

                <!-- 每日读经答题按钮 (新增) -->
                <button onclick="startQuiz('daily')" class="w-full bg-emerald-600 text-white font-bold py-5 px-6 rounded-2xl shadow-md hover:bg-emerald-700 active:scale-95 transition-all text-2xl flex items-center justify-center">
                    <svg class="w-7 h-7 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    每日读经答题
                </button>
                
                <!-- 错题按钮，如果有错题则动态显示 -->
                <button id="mistakesBtn" onclick="startQuiz('mistake')" class="hidden w-full bg-red-100 text-red-600 font-bold py-5 px-6 rounded-2xl shadow-sm hover:bg-red-200 active:scale-95 transition-all text-2xl flex items-center justify-center">
                    错题订正 (0)
                </button>
            </div>
        </div>

        <!-- ================= 2. 答题页面 (Quiz Screen) ================= -->
        <div id="quizScreen" class="hidden flex-col h-full w-full">
            <!-- 顶部进度与计时栏 -->
            <div class="bg-white pt-6 pb-4 px-6 rounded-b-[2rem] shadow-sm z-20 shrink-0">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-gray-500 font-bold text-xl tracking-wider" id="progressText">1 / 50</span>
                    <span class="text-blue-600 font-bold text-xl font-mono bg-blue-50 px-3 py-1 rounded-lg" id="timerDisplay">00:00</span>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-2">
                    <div id="progressBar" class="bg-blue-600 h-2 rounded-full transition-all duration-300 ease-out" style="width: 2%"></div>
                </div>
            </div>

            <!-- 问题与选项滚动区 -->
            <div class="flex-grow overflow-y-auto px-6 py-6 pb-32 no-scrollbar" id="questionArea">
                <h2 id="questionText" class="text-3xl font-bold text-gray-900 mb-8 leading-snug tracking-wide">
                    <!-- 问题内容注入 -->
                </h2>
                
                <div class="space-y-5" id="optionsContainer">
                    <!-- 选项注入 -->
                </div>
                
                <!-- 反馈区域 (初始隐藏) -->
                <div id="feedbackBox" class="hidden mt-8 slide-up">
                    <div id="feedbackBanner" class="p-5 rounded-2xl mb-4 font-bold text-center flex items-center justify-center text-2xl">
                        <!-- 结果标志注入 -->
                    </div>
                    <div class="bg-blue-50/80 rounded-2xl p-6 border-2 border-blue-100">
                        <p id="feedbackRef" class="text-lg font-bold text-blue-600 mb-3">【经文出处】</p>
                        <p id="feedbackVerse" class="text-2xl text-gray-800 leading-relaxed font-medium">
                            <!-- 经文内容注入 -->
                        </p>
                    </div>
                </div>
            </div>

            <!-- 绝对定位的底部操作区 (不会被遮挡) -->
            <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-[#F2F2F7] via-[#F2F2F7] to-transparent z-30">
                <button id="nextBtn" onclick="nextQuestion()" class="w-full bg-gray-900 text-white font-bold py-5 px-6 rounded-2xl shadow-xl hover:bg-black active:scale-95 transition-all text-2xl opacity-0 translate-y-4 pointer-events-none">
                    下一题
                </button>
            </div>
        </div>

        <!-- ================= 3. 结果页面 (Result Screen) ================= -->
        <div id="resultScreen" class="hidden flex-col items-center justify-center h-full p-8 w-full slide-up">
            <div class="bg-white w-full rounded-[2rem] shadow-lg p-8 flex flex-col items-center text-center">
                <div id="resultIcon" class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-6">
                    <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-3xl font-bold text-gray-900 mb-2">完成答题！</h2>
                <p class="text-gray-500 mb-8 text-xl" id="resultDesc">本次练习情况如下</p>
                
                <div class="flex w-full space-x-4 mb-8">
                    <div class="flex-1 bg-blue-50 p-4 rounded-2xl">
                        <p class="text-base text-blue-600 font-bold mb-1">得分</p>
                        <p class="text-4xl font-bold text-gray-900" id="scoreDisplay">0</p>
                    </div>
                    <div class="flex-1 bg-orange-50 p-4 rounded-2xl">
                        <p class="text-base text-orange-600 font-bold mb-1">用时</p>
                        <p class="text-4xl font-bold text-gray-900" id="timeDisplay">00:00</p>
                    </div>
                </div>

                <button onclick="returnToHome()" class="w-full bg-gray-900 text-white font-bold py-5 px-6 rounded-2xl shadow-md hover:bg-black active:scale-95 transition-all text-2xl mb-4">
                    返回首页
                </button>
            </div>
        </div>
    </div>

    <script>
        // === 题目数据 (主测：耶稣生平 60 题) ===
        const allQuestions = [
            // 原有的 50 道题
            {
                q: "耶稣肉身的父母是谁？他们住在哪里？",
                options: ["亚伯拉罕和撒拉；耶路撒冷", "约瑟和马利亚；拿撒勒", "撒迦利亚和以利沙伯；伯利恒", "大卫和拔示巴；拿撒勒"],
                answer: 1,
                ref: "路加福音 1:26-27",
                verse: "到了第六个月，天使加百列奉神的差遣往加利利的一座城去（这城名叫拿撒勒），到一个童女那里，是已经许配大卫家的一个人，名叫约瑟。童女的名字叫马利亚。"
            },
            {
                q: "当耶稣要被圣灵感孕时，谁找到了约瑟对他说了什么？",

                answer: 2,
                ref: "马太福音 1:20",

            },
            {
                q: "约瑟听到使者的话以后是怎么做的？",
                options: ["暗暗地把她休了", "要求马利亚离开", "遵着主使者的吩咐把妻子娶过来", "带着马利亚逃往埃及"],
                answer: 2,

            {

                answer: 1,
                ref: "路加福音 1:28,31",
                verse: "天使进去，对她说：“蒙大恩的女子，我问你安，主和你同在了！”...你要怀孕生子，可以给他起名叫耶稣。"
            },
            {
                q: "马利亚听见天使说她要怀孕生子，她是如何回应的？",
                options: ["我不信，因为我没有出嫁", "这事怎么能成就呢？", "我是主的使女，情愿照你的话成就在我身上", "请你给我一个神迹"],
                answer: 2,

            {

                answer: 2,

            {

            },
            {
                q: "天使把耶稣降生的好消息报给了谁？",

                answer: 2,
                ref: "路加福音 2:8-10",
                verse: "在伯利恒之野地里有牧羊的人，夜间按着更次看守羊群。有主的使者站在他们旁边...天使对他们说：“不要惧怕！我报给你们大喜的信息...”"

            {
                q: "那些听到好消息的牧羊人是怎么做的？",

                answer: 1,
                ref: "路加福音 2:15-16",
                verse: "众天使离开他们，升天去了。牧羊的人彼此说：“我们往伯利恒去，看看所成的事...”他们急忙去了，就寻见马利亚和约瑟，又有那婴孩卧在马槽里。"
            },
            {
                q: "谁做罗马皇帝时耶稣出生？",
                options: ["提庇留", "奥古斯都", "尼禄", "革老丢"],
                answer: 1,
                ref: "路加福音 2:1",

            },
            {

                answer: 2,

            {

                answer: 1,
                ref: "马太福音 1:23",
                verse: "“必有童女怀孕生子；人要称他的名为以马内利。”（以马内利翻出来就是“神与我们同在”。）"
            },
            {
                q: "耶稣生在伯利恒时，东方博士蒙神用星指示，有怎样的反应?",
                options: ["感到惊恐不安", "特来拜他，俯伏拜那小孩子，献上礼物", "立刻去告诉大祭司", "返回东方查考书卷"],
                answer: 1,
                ref: "马太福音 2:2,11",
                verse: "那生下来作犹太人之王的在哪里？我们在东方看见他的星，特来拜他...进了房子，看见小孩子和他母亲马利亚，就俯伏拜那小孩子，揭开宝盒，拿黄金、乳香、没药为礼物献给他。"
            },
            {
                q: "东方博士献给小孩子耶稣的礼物是什么？",
                options: ["牛、羊、鸽子", "金银宝石", "黄金、乳香、没药", "细麻布和香料"],
                answer: 2,
                ref: "马太福音 2:11",
                verse: "进了房子，看见小孩子和他母亲马利亚，就俯伏拜那小孩子，揭开宝盒，拿黄金、乳香、没药为礼物献给他。"
            },
            {
                q: "耶稣生在伯利恒时，希律王听到这个消息后，是怎样的反应？",

                answer: 2,
                ref: "马太福音 2:3",
                verse: "希律王听见了，就心里不安；耶路撒冷合城的人也都不安。"
            },
            {
                q: "耶稣生在伯利恒时，耶路撒冷城的人听到了，是怎样的反应？",
                options: ["欢呼雀跃", "合城的人也都不安", "举行盛大庆典", "预备迎接君王"],
                answer: 1,
                ref: "马太福音 2:3",
                verse: "希律王听见了，就心里不安；耶路撒冷合城的人也都不安。"
            },
            {
                q: "天使指示约瑟叫他们带小孩耶稣逃往哪里去？",
                options: ["叙利亚", "撒马利亚", "埃及", "大马士革"],
                answer: 2,
                ref: "马太福音 2:13",
                verse: "他们去后，有主的使者向约瑟梦中显现，说：“起来！带着小孩子同他母亲逃往埃及，住在那里，等我吩咐你；因为希律必寻找小孩子，要除灭他。”"
            },
            {
                q: "希律王为了除灭小孩子耶稣，下令杀死了多大岁数的男孩？",

                answer: 2,
                ref: "马太福音 2:16",

            {

            {

            {
                q: "在圣殿里除了西缅，还有一位女先知也称谢神并讲论这孩子，她是谁？",

            {

            }
        }

        // === 计时器逻辑 ===
        function startTimer() {
            elapsedSeconds = 0;
            updateTimerDisplay();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                elapsedSeconds++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(elapsedSeconds / 60).toString().padStart(2, '0');
            const secs = (elapsedSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${mins}:${secs}`;
        }

        // === 核心流程控制 ===
        function startQuiz(quizType) {
            if (quizType === 'main') {
                currentQuestions = [...allQuestions];
            } else if (quizType === 'daily') {
                currentQuestions = [...dailyQuestions];
            } else if (quizType === 'mistake') {
                const combinedBank = [...allQuestions, ...dailyQuestions];
                // 过滤出错题，同时去重避免两边库题干重复导致的冗余
                const uniqueMistakes = [...new Set(mistakes)];
                currentQuestions = combinedBank.filter(q => uniqueMistakes.includes(q.q));
                
                // 去重处理防重复加载
                const seen = new Set();
                currentQuestions = currentQuestions.filter(el => {
                    const duplicate = seen.has(el.q);
                    seen.add(el.q);
                    return !duplicate;
                });

                if (currentQuestions.length === 0) return;
            }
            
            currentIndex = 0;
            score = 0;
            
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('quizScreen').classList.add('flex');
            
            startTimer();
            renderQuestion();
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            const progress = ((currentIndex + 1) / currentQuestions.length) * 100;
            
            document.getElementById('progressText').innerText = `${currentIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('progressBar').style.width = `${progress}%`;
            
            // 安全注入题干
            document.getElementById('questionText').innerText = q.q;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            // 安全注入选项 (适老化大字号排版)
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-6 rounded-2xl border-2 border-transparent bg-white shadow-sm font-medium text-gray-800 hover:border-gray-200 transition-colors text-2xl leading-snug";
                btn.onclick = () => handleAnswer(idx);
                
                const span = document.createElement('span');
                span.className = "inline-block w-12 text-gray-400 font-bold";
                span.innerText = `${String.fromCharCode(65 + idx)}.`;
                
                const textNode = document.createTextNode(` ${opt}`);
                
                btn.appendChild(span);
                btn.appendChild(textNode);
                optionsContainer.appendChild(btn);
            });
            
            // 隐藏反馈区和下一题按钮
            document.getElementById('feedbackBox').classList.add('hidden');
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            nextBtn.innerText = currentIndex === currentQuestions.length - 1 ? '查看结果' : '下一题';
            
            // 滚动回顶部
            document.getElementById('questionArea').scrollTop = 0;
        }

        function handleAnswer(selectedIndex) {
            const q = currentQuestions[currentIndex];
            const isCorrect = selectedIndex === q.answer;
            const options = document.querySelectorAll('.option-btn');
            
            // 禁用所有选项并标记颜色
            options.forEach((btn, idx) => {
                btn.classList.add('option-disabled');
                if (idx === q.answer) {
                    btn.classList.add('option-correct');
                } else if (idx === selectedIndex && !isCorrect) {
                    btn.classList.add('option-wrong');
                }
            });
            
            // 错题收集与订正机制
            if (isCorrect) {
                score++;
                // 答对了，就从总错题本里将其移除
                mistakes = mistakes.filter(mistake => mistake !== q.q);
                saveMistakes();
            } else {
                // 答错了，若不在错题本则加入
                if (!mistakes.includes(q.q)) {
                    mistakes.push(q.q);
                    saveMistakes();
                }
            }
            
            // 显示反馈
            const feedbackBox = document.getElementById('feedbackBox');
            const feedbackBanner = document.getElementById('feedbackBanner');
            
            if (isCorrect) {
                feedbackBanner.className = "p-5 rounded-2xl mb-4 font-bold text-center flex items-center justify-center text-2xl bg-green-100 text-green-700";
                feedbackBanner.innerHTML = `<svg class="w-8 h-8 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg> 回答正确`;
            } else {
                feedbackBanner.className = "p-5 rounded-2xl mb-4 font-bold text-center flex items-center justify-center text-2xl bg-red-100 text-red-700";
                feedbackBanner.innerHTML = `<svg class="w-8 h-8 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg> 回答错误，正确答案是 ${String.fromCharCode(65 + q.answer)}`;
            }
            
            document.getElementById('feedbackRef').innerText = `【${q.ref}】`;
            document.getElementById('feedbackVerse').innerText = q.verse;
            
            feedbackBox.classList.remove('hidden');
            
            // 显示下一题按钮
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            
            // 自动平滑滚动到底部
            setTimeout(() => {
                document.getElementById('questionArea').scrollTo({
                    top: document.getElementById('questionArea').scrollHeight,
                    behavior: 'smooth'
                });
            }, 100);
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            stopTimer();
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('flex');
            
            const resultScreen = document.getElementById('resultScreen');
            resultScreen.classList.remove('hidden');
            resultScreen.classList.add('flex');
            
            document.getElementById('scoreDisplay').innerText = `${score} / ${currentQuestions.length}`;
            
            const mins = Math.floor(elapsedSeconds / 60).toString().padStart(2, '0');
            const secs = (elapsedSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timeDisplay').innerText = `${mins}:${secs}`;
            
            const resultDesc = document.getElementById('resultDesc');
            const resultIcon = document.getElementById('resultIcon');
            
            if (score === currentQuestions.length) {
                resultDesc.innerText = "太棒了！全答对了！";
                resultIcon.className = "w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mb-6";
                resultIcon.innerHTML = `<svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
            } else {
                resultDesc.innerText = `还需要继续努力熟悉经文哦`;
                resultIcon.className = "w-24 h-24 bg-orange-100 rounded-full flex items-center justify-center mb-6";
                resultIcon.innerHTML = `<svg class="w-12 h-12 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            }
        }

        function returnToHome() {
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('flex');
            document.getElementById('homeScreen').classList.remove('hidden');
            updateHomeBtn();
        }

        function saveMistakes() {
            localStorage.setItem('jesusQuizMistakesAll', JSON.stringify(mistakes));
        }
    </script>
</body>
</html>
